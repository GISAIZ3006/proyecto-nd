name: Morning Sync Agent

on:
  schedule:
    - cron: '0 12 * * *' # Ejecuta a las 8:00 AM EST (12:00 UTC)
  workflow_dispatch: # Botón manual para probar en GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Repo
        uses: actions/checkout@v2
      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Run Scraper
        run: python update_news.py
      - name: Save Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add news_data.json
          git commit -m "Automated Morning Update: $(date)" || exit 0
          git push
