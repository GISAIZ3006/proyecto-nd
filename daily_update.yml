name: Daily News Update

on:
  schedule:
    # Esta es la parte clave: '0 12 * * *' ejecuta el código a las 8:00 AM EST
    # (GitHub usa hora UTC, por lo que 12:00 UTC son las 8:00 AM en South Bend)
    - cron: '0 12 * * *'
  workflow_dispatch: # Esto te permite ejecutarlo a mano si quieres probar

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news scraper
        run: python update_news.py  # Aquí va el script que busca las noticias

      - name: Commit and push if changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add news_data.json
          git commit -m "Update Morning Intelligence" || exit 0
          git push
